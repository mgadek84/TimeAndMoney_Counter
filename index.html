<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Licznik spalania</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: #fff;
      padding: 50px;
    }

    input, button {
      padding: 10px;
      font-size: 18px;
      margin: 10px;
    }

    .box {
      margin-top: 30px;
      font-size: 24px;
    }

    .progress {
      width: 300px;
      height: 20px;
      background: #333;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: red;
      width: 100%;
    }
  </style>
</head>
<body>

<h1>🔥 Licznik spalania budżetu</h1>

<input id="monthly" type="number" value="10000">
<br>
<button onclick="start()">🚀 Start</button>

<div class="box" id="output"></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<script>
let interval;

function start() {
  clearInterval(interval);

  const monthly = parseFloat(document.getElementById("monthly").value);
  const secondsInMonth = 365.25 / 12 * 24 * 3600;
  const rate = monthly / secondsInMonth;

  const startTime = Date.now();

  interval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const spent = elapsed * rate;
    const remaining = monthly - spent;

    document.getElementById("output").innerHTML = `
      ⏱ ${elapsed.toFixed(1)} s<br>
      💸 ${spent.toFixed(2)} zł<br>
      💰 ${remaining.toFixed(2)} zł
    `;

    const percent = (remaining / monthly) * 100;
    document.getElementById("bar").style.width = percent + "%";
  }, 50);
}
</script>

</body>
</html>
