<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Life & Cash Tracker</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 460px;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 25px;
}

.card {
  background: #1a1a1a;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 20px;
}

.menu-button,
button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.menu-button {
  background: #242424;
  color: white;
}

.menu-button:hover {
  background: #333;
}

button {
  background: #ff3b3b;
  color: white;
}

input,
select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #222;
  padding: 14px;
  border-radius: 12px;
  margin-top: 10px;
}

.checkbox-row input {
  width: auto;
  transform: scale(1.3);
}

.stat {
  background: #222;
  padding: 14px;
  border-radius: 12px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.counter {
  margin-top: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: #111;
  padding: 18px;
  border-radius: 14px;
  letter-spacing: 1px;
  line-height: 1.4;
}

.small {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 8px;
  text-align: center;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <h1>🔥 Life & Cash</h1>

  <!-- HOME -->
  <div class="card" id="home">

    <button class="menu-button" onclick="showCash()">
      💸 Cash Burndown
    </button>

    <button class="menu-button" onclick="showLife()">
      ⏳ Your Expected Time Left (New!)
    </button>

  </div>

  <!-- CASH APP -->
  <div id="cashApp" class="hidden">

    <div class="card">
      <h2>💸 Cash Burndown</h2>

      <input id="monthly" type="number" value="10000">

      <button onclick="startCash()">
        🚀 Start
      </button>

      <div class="stat">
        <span>⏱ Time</span>
        <span id="cashTime">0 s</span>
      </div>

      <div class="stat">
        <span>💸 Spent</span>
        <span id="cashSpent">0 zł</span>
      </div>

      <div class="stat">
        <span>💰 Remaining</span>
        <span id="cashRemaining">0 zł</span>
      </div>

      <button onclick="goHome()">
        ← Back
      </button>

    </div>

  </div>

  <!-- LIFE APP -->
  <div id="lifeApp" class="hidden">

    <div class="card">

      <h2>⏳ Expected Time Left</h2>

      <input id="age" type="number" placeholder="Your age">

      <select id="sex">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <select id="country">
        <option value="poland">Poland</option>
        <option value="usa">USA</option>
        <option value="germany">Germany</option>
        <option value="france">France</option>
        <option value="japan">Japan</option>
        <option value="uk">United Kingdom</option>
      </select>

      <div class="checkbox-row">
        <span>🚬 Smoker</span>
        <input type="checkbox" id="smoker">
      </div>

      <div class="checkbox-row">
        <span>🍺 Drinker</span>
        <input type="checkbox" id="drinker">
      </div>

      <div class="checkbox-row">
        <span>🍔 Overweight</span>
        <input type="checkbox" id="overweight">
      </div>

      <button onclick="calculateLife()">
        🧠 Calculate
      </button>

      <div class="stat">
        <span>📆 Years left</span>
        <span id="yearsLeft">0</span>
      </div>

      <div class="stat">
        <span>📅 Months left</span>
        <span id="monthsLeft">0</span>
      </div>

      <div class="stat">
        <span>📍 Days left</span>
        <span id="daysLeft">0</span>
      </div>

      <div class="counter" id="lifeCounter">
        00:00:00:00:00:00
      </div>

      <div class="small">
        yy:mm:dd:hh:mm:ss
      </div>

      <button onclick="goHome()">
        ← Back
      </button>

    </div>

  </div>

</div>

<script>

let cashInterval;
let lifeInterval;

function goHome() {
  document.getElementById("home").classList.remove("hidden");
  document.getElementById("cashApp").classList.add("hidden");
  document.getElementById("lifeApp").classList.add("hidden");
}

function showCash() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("cashApp").classList.remove("hidden");
}

function showLife() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("lifeApp").classList.remove("hidden");
}

/* =========================
   CASH APP
========================= */

function startCash() {

  clearInterval(cashInterval);

  const monthly = parseFloat(
    document.getElementById("monthly").value
  );

  const secondsInMonth = 365.25 / 12 * 24 * 3600;

  const rate = monthly / secondsInMonth;

  const startTime = Date.now();

  cashInterval = setInterval(() => {

    const elapsed = (Date.now() - startTime) / 1000;

    const spent = elapsed * rate;

    document.getElementById("cashTime").innerText =
      elapsed.toFixed(1) + " s";

    document.getElementById("cashSpent").innerText =
      spent.toFixed(2) + " zł";

    document.getElementById("cashRemaining").innerText =
      (monthly - spent).toFixed(2) + " zł";

  }, 50);
}

/* =========================
   LIFE APP
========================= */

const lifespanData = {
  poland: {
    male: 74,
    female: 82
  },
  usa: {
    male: 74,
    female: 80
  },
  germany: {
    male: 79,
    female: 83
  },
  france: {
    male: 80,
    female: 85
  },
  japan: {
    male: 82,
    female: 88
  },
  uk: {
    male: 79,
    female: 83
  }
};

function calculateLife() {

  clearInterval(lifeInterval);

  const age = parseFloat(
    document.getElementById("age").value
  );

  const sex =
    document.getElementById("sex").value;

  const country =
    document.getElementById("country").value;

  const smoker =
    document.getElementById("smoker").checked;

  const drinker =
    document.getElementById("drinker").checked;

  const overweight =
    document.getElementById("overweight").checked;

  let expected =
    lifespanData[country][sex];

  /* penalties */

  if (smoker) expected -= 10;
  if (drinker) expected -= 4;
  if (overweight) expected -= 5;

  let yearsLeft = expected - age;

  if (yearsLeft < 0) {
    yearsLeft = 0;
  }

  const monthsLeft =
    Math.floor(yearsLeft * 12);

  const daysLeft =
    Math.floor(yearsLeft * 365.25);

  document.getElementById("yearsLeft").innerText =
    yearsLeft.toFixed(1);

  document.getElementById("monthsLeft").innerText =
    monthsLeft;

  document.getElementById("daysLeft").innerText =
    daysLeft;

  let remainingSeconds =
    Math.floor(yearsLeft * 365.25 * 24 * 3600);

  updateCounter(remainingSeconds);

  lifeInterval = setInterval(() => {

    remainingSeconds--;

    if (remainingSeconds <= 0) {
      remainingSeconds = 0;
      clearInterval(lifeInterval);
    }

    updateCounter(remainingSeconds);

  }, 1000);

}

function updateCounter(totalSeconds) {

  const years =
    Math.floor(totalSeconds / (365.25 * 24 * 3600));

  totalSeconds -=
    years * 365.25 * 24 * 3600;

  const months =
    Math.floor(totalSeconds / (30.44 * 24 * 3600));

  totalSeconds -=
    months * 30.44 * 24 * 3600;

  const days =
    Math.floor(totalSeconds / (24 * 3600));

  totalSeconds -=
    days * 24 * 3600;

  const hours =
    Math.floor(totalSeconds / 3600);

  totalSeconds -=
    hours * 3600;

  const minutes =
    Math.floor(totalSeconds / 60);

  const seconds =
    Math.floor(totalSeconds % 60);

  document.getElementById("lifeCounter").innerText =
    pad(years) + ":" +
    pad(months) + ":" +
    pad(days) + ":" +
    pad(hours) + ":" +
    pad(minutes) + ":" +
    pad(seconds);

}

function pad(num) {
  return String(num).padStart(2, "0");
}

</script>

</body>
</html>
