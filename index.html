<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

h1 {
  text-align: center;
}

.card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

input {
  background: #222;
  color: white;
}

button {
  background: #ff3b3b;
  color: white;
  font-weight: bold;
}

.stat {
  background: #222;
  padding: 14px;
  border-radius: 12px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.progress-block {
  margin-top: 16px;
}

.progress-label {
  font-size: 14px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.progress {
  width: 100%;
  height: 18px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: red;
  transition: width 0.2s linear;
}

</style>
</head>

<body>

<div class="container">
  <h1>🔥 Spalanie budżetu</h1>

  <div class="card">
    <input id="monthly" type="number" value="10000">
    <button onclick="start()">🚀 Start</button>

    <div class="stat">
      <span>⏱</span>
      <span id="time">0 s</span>
    </div>

    <div class="stat">
      <span>💸</span>
      <span id="spent">0 zł</span>
    </div>

    <div class="stat">
      <span>💰</span>
      <span id="remaining">0 zł</span>
    </div>

    <!-- BARS -->
    <div id="bars"></div>

  </div>
</div>

<script>
let interval;

const periods = [
  { name: "🕐 Minuta", seconds: 60 },
  { name: "🕑 Godzina", seconds: 3600 },
  { name: "📅 Dzień", seconds: 86400 },
  { name: "📆 Tydzień", seconds: 604800 },
  { name: "🗓 Miesiąc", seconds: 2629800 }
];

function createBars() {
  const container = document.getElementById("bars");
  container.innerHTML = "";

  periods.forEach(p => {
    container.innerHTML += `
      <div class="progress-block">
        <div class="progress-label">
          <span>${p.name}</span>
          <span id="${p.name}-label">0 / 0</span>
        </div>
        <div class="progress">
          <div class="bar" id="${p.name}-bar"></div>
        </div>
      </div>
    `;
  });
}

function start() {
  clearInterval(interval);
  createBars();

  const monthly = parseFloat(document.getElementById("monthly").value);
  const secondsInMonth = 365.25 / 12 * 24 * 3600;
  const rate = monthly / secondsInMonth;

  const startTime = Date.now();

  interval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const spent = elapsed * rate;

    document.getElementById("time").innerText = elapsed.toFixed(1) + " s";
    document.getElementById("spent").innerText = spent.toFixed(2) + " zł";
    document.getElementById("remaining").innerText = (monthly - spent).toFixed(2) + " zł";

    periods.forEach(p => {
      const total = rate * p.seconds;
      const used = spent;
      const percentUsed = Math.min(100, (used / total) * 100);

      const bar = document.getElementById(p.name + "-bar");
      const label = document.getElementById(p.name + "-label");

      bar.style.width = percentUsed + "%";

      label.innerText =
        `${Math.max(0, total - used).toFixed(0)} / ${total.toFixed(0)} zł`;
    });

  }, 50);
}
</script>

</body>
</html>
