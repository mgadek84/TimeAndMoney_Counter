<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licznik spalania</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

h1 {
  font-size: 22px;
  text-align: center;
}

.card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
}

input, button {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

input {
  background: #222;
  color: white;
}

button {
  background: #ff3b3b;
  color: white;
  font-weight: bold;
}

.stat {
  background: #222;
  padding: 14px;
  border-radius: 12px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.progress-block {
  margin-top: 16px;
}

.progress-label {
  font-size: 14px;
  margin-bottom: 6px;
  opacity: 0.8;
  display: flex;
  justify-content: space-between;
}

.progress {
  width: 100%;
  height: 18px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 100%;
  transition: all 0.2s linear;
}

</style>
</head>

<body>

<div class="container">
  <h1>🔥 Spalanie budżetu</h1>

  <div class="card">
    <input id="monthly" type="number" value="10000">
    <button onclick="start()">🚀 Start</button>

    <div class="stat">
      <span>⏱ Czas</span>
      <span id="time">0 s</span>
    </div>

    <div class="stat">
      <span>💸 Wydane</span>
      <span id="spent">0 zł</span>
    </div>

    <div class="stat">
      <span>💰 Zostało</span>
      <span id="remaining">0 zł</span>
    </div>

    <!-- MONTH -->
    <div class="progress-block">
      <div class="progress-label">
        <span>🗓 Miesiąc</span>
        <span id="monthLabel">0 / 0</span>
      </div>
      <div class="progress">
        <div class="bar" id="monthBar"></div>
      </div>
    </div>

    <!-- WEEK -->
    <div class="progress-block">
      <div class="progress-label">
        <span>📆 Tydzień</span>
        <span id="weekLabel">0 / 0</span>
      </div>
      <div class="progress">
        <div class="bar" id="weekBar"></div>
      </div>
    </div>

    <!-- DAY -->
    <div class="progress-block">
      <div class="progress-label">
        <span>📅 Dzień</span>
        <span id="dayLabel">0 / 0</span>
      </div>
      <div class="progress">
        <div class="bar" id="dayBar"></div>
      </div>
    </div>

  </div>
</div>

<script>
let interval;

function getColor(percent) {
  const r = Math.floor(255 * (1 - percent/100));
  const g = Math.floor(200 * (percent/100));
  return `rgb(${r}, ${g}, 80)`;
}

function start() {
  clearInterval(interval);

  const monthly = parseFloat(document.getElementById("monthly").value);
  const daily = monthly / 30;
  const weekly = daily * 7;

  const secondsInMonth = 365.25 / 12 * 24 * 3600;
  const rate = monthly / secondsInMonth;

  const startTime = Date.now();

  interval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const spent = elapsed * rate;

    const remainingMonth = monthly - spent;
    const remainingWeek = weekly - spent;
    const remainingDay = daily - spent;

    document.getElementById("time").innerText = elapsed.toFixed(1) + " s";
    document.getElementById("spent").innerText = spent.toFixed(2) + " zł";
    document.getElementById("remaining").innerText = remainingMonth.toFixed(2) + " zł";

    updateBar("monthBar", "monthLabel", remainingMonth, monthly);
    updateBar("weekBar", "weekLabel", remainingWeek, weekly);
    updateBar("dayBar", "dayLabel", remainingDay, daily);

  }, 50);
}

function updateBar(barId, labelId, remaining, total) {
  const percent = Math.max(0, (remaining / total) * 100);

  const bar = document.getElementById(barId);
  bar.style.width = percent + "%";
  bar.style.background = getColor(percent);

  document.getElementById(labelId).innerText =
    `${Math.max(0, remaining).toFixed(0)} / ${total.toFixed(0)} zł`;
}
</script>

</body>
</html>
